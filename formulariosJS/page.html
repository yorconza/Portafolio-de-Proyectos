<!DOCTYPE html>
<html>

<head>
<title>Formulario</title>
</head>

<body>

<h2>Registro</h2>

<form id="formulario">

<label>
    <em>Nombre completo</em>
    <input type="text" id="nombre" placeholder="Nombre" required>
</label>
<br><br>

<label>
    <em>Correo Electrónico</em>
    <input type="email" id="email" placeholder="ejemplo@gmail.com" required>
</label>
<br><br>

<label>
    <em>Contraseña</em>
    <input type="password" id="passwords" placeholder="******" required>
</label>
<br><br>

<button type="submit">Guardar</button>

</form>

<script src="app.js"></script>

</body>
</html>
